# G.O.A.T REST API Configuration

# Server configuration
server.port=9295
server.servlet.context-path=/api
server.tomcat.max-threads=200
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=logs/access
server.tomcat.accesslog.pattern=%t %a "%r" %s (%D ms)

# Application info
spring.application.name=GOAT-API
application.version=1.0.0
application.description=G.O.A.T Framework REST API

# Enhanced logging configuration
logging.level.root=INFO
logging.level.goat.framework=DEBUG
logging.level.goat.api=DEBUG
logging.level.goat.gui=DEBUG
logging.level.org.springframework.web=INFO
logging.file.path=../log/api
logging.file.name=${logging.file.path}/goat_api.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Framework log configuration
goat.framework.log.path=../log/framework
goat.framework.log.level=INFO

# Disable auto-configurations that cause dependency issues
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.web.servlet.error.ErrorMvcAutoConfiguration

# Disable Swagger/SpringDoc by default to avoid dependency issues
# Only enable if dependencies are properly installed
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.packagesToScan=com.me.api.controller

# CORS configuration
goat.api.cors.allowed-origins=http://localhost:9295
goat.api.cors.allowed-methods=GET,POST,PUT,DELETE
goat.api.cors.max-age=3600

# Framework configuration
goat.home=../../../..
goat.testcases.path=${goat.home}/manual_cases
goat.reports.path=${goat.home}/logs/reports

# API Explorer configuration
goat.api.explorer.enabled=true

#Files API configuration
goat.api.files.upload-dir=${goat.home}/UploadFiles
# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
